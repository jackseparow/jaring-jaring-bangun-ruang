<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membuat Bangun Ruang - Editor Titik</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <div class="header">
            <img src="siyo.png" id="mascot-img" alt="Si Yo" onerror="this.src='https://via.placeholder.com/50?text=Si+Yo'">
            <h2>Membuat Bangun Ruang</h2>
        </div>
        
        <div class="shape-menu">
            <button onclick="startMode('poly')">Buat Poligon</button>
            <button onclick="startMode('circle')">Buat Lingkaran</button>
        </div>
        
        <div class="info-box">
            <p id="hint">Mode: <b>View</b><br>Klik objek untuk edit titik.</p>
        </div>

        <button class="reset-btn" onclick="resetAll()">HAPUS SEMUA</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
