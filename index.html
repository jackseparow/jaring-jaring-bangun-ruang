<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Builder Pro - Taman Numerasi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <div class="header">
            <img src="siyo.png" id="mascot-img" alt="Si Yo">
            <h2>Net Builder</h2>
        </div>
        <p class="status-text" id="status">Mode: View</p>
        
        <div class="control-group">
            <label>Warna</label>
            <input type="color" id="colorPicker" value="#3498db">
        </div>
        <div class="control-group">
            <label>Skala</label>
            <input type="range" id="sizeSlider" min="0.5" max="3" step="0.1" value="1">
        </div>

        <div class="shape-menu">
            <button onclick="addShape('poly', 3)">Segitiga</button>
            <button onclick="addShape('poly', 4)">Persegi</button>
            <button onclick="addShape('circle')">Lingkaran</button>
            <button onclick="startDraw('poly')">Gambar Poligon</button>
            <button onclick="startDraw('curve')">Gambar Kurva</button>
        </div>
        <hr>
        <button id="fold-btn" onclick="toggleFold()">LIPAT JADI 3D</button>
        <button class="reset-btn" onclick="resetAll()">RESET SEMUA</button>
        <p style="font-size: 10px; color: #777; margin-top: 10px;">*Tekan ENTER jika selesai menggambar</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
