<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Builder Pro - Si Yo Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <div class="header">
            <img src="siyo.png" id="mascot-img" alt="Si Yo" onerror="this.src='https://via.placeholder.com/50?text=Si+Yo'">
            <h2>Net Builder</h2>
        </div>
        <p class="status-text" id="status">Mode: View (Orbit)</p>
        
        <div class="control-group">
            <label>Warna</label>
            <input type="color" id="colorPicker" value="#3498db">
        </div>

        <div class="shape-menu">
            <button onclick="addBasicShape(3)">Segitiga</button>
            <button onclick="addBasicShape(4)">Persegi</button>
            <button onclick="startDrawMode('poly')">Sisi Lurus</button>
            <button onclick="startDrawMode('curve')">Sisi Lengkung</button>
        </div>
        <hr>
        <button id="fold-btn" onclick="toggleFold()">LIPAT (3D)</button>
        <button class="reset-btn" onclick="resetAll()">HAPUS SEMUA</button>
        <p class="hint"><b>Drag:</b> Pindahkan | <b>Enter:</b> Selesai Gambar</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
