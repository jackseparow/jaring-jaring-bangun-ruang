<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>3D Net & Shape Builder Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <h3>Shape Builder Pro</h3>
        <div class="control-group">
            <label>Warna:</label>
            <input type="color" id="colorPicker" value="#3498db">
        </div>
        <div class="control-group">
            <label>Ukuran:</label>
            <input type="range" id="sizeSlider" min="0.5" max="3" step="0.1" value="1">
        </div>
        <hr>
        <div class="shape-menu">
            <button onclick="addShape('poly', 3)">Segitiga</button>
            <button onclick="addShape('poly', 4)">Persegi</button>
            <button onclick="addShape('circle')">Lingkaran</button>
            <button onclick="startCustomPolygon()">Gambar Poligon</button>
            <button onclick="startCurveDraw()">Gambar Kurva</button>
        </div>
        <hr>
        <button id="fold-btn" onclick="toggleFold()">LIPAT (3D)</button>
        <button class="reset-btn" onclick="resetAll()">RESET</button>
    </div>
    <div id="status">Mode: View</div>
    <script src="app.js"></script>
</body>
</html>
