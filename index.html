<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Builder - Advance Polypad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #121212; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 240px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        #mascot-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #3498db; }
        h2 { margin: 0; font-size: 1rem; color: #1a1a2e; }
        
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        button { padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; font-weight: bold; font-size: 0.75em; }
        button:hover { background: #3498db; color: white; }

        .editor-panel { border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px; }
        .control-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        label { font-size: 0.8em; color: #555; font-weight: bold; }

        .hint { font-size: 0.7em; color: #888; margin-top: 10px; line-height: 1.4; }
        .reset-btn { width: 100%; background: #e74c3c; color: white; border: none; margin-top: 10px; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="ui-panel">
        <div class="header">
            <img src="siyo.png" id="mascot-img" alt="Si Yo" onerror="this.src='https://via.placeholder.com/50?text=Si+Yo'">
            <h2>Net Builder</h2>
        </div>
        
        <div class="menu">
            <button onclick="spawn('square')">Persegi</button>
            <button onclick="spawn('triangle')">Segitiga</button>
            <button onclick="spawn('circle')">Lingkaran</button>
            <button onclick="rotateSelected()">Putar (R)</button>
        </div>

        <div class="editor-panel" id="editor">
            <div class="control-group">
                <label>Warna</label>
                <input type="color" id="colorInput" oninput="updateSelectedStyle()">
            </div>
            <div class="control-group">
                <label>Ukuran Sisi</label>
                <input type="range" id="sizeInput" min="1" max="6" step="0.5" oninput="updateSelectedStyle()">
            </div>
        </div>

        <div class="hint">
            <b>Klik:</b> Pilih | <b>Drag:</b> Pindah<br>
            <b>Tombol R:</b> Putar 45°
        </div>
        <button class="reset-btn" onclick="location.reload()">RESET</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
