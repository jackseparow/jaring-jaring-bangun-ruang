<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Builder Pro - Selection Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #0f0c29; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 250px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 100;
        }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        #mascot-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #3498db; background: white; }
        h2 { margin: 0; font-size: 1.1em; color: #1a1a2e; }
        
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 8px; font-weight: bold; font-size: 0.75em; background: white; }
        button:hover { background: #3498db; color: white; }

        .editor-panel { border-top: 1px solid #ddd; padding-top: 12px; margin-top: 10px; }
        .control-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        label { font-size: 0.8em; color: #333; font-weight: bold; }

        .hint { font-size: 0.75em; color: #444; margin-top: 12px; line-height: 1.5; background: #eef2f7; padding: 10px; border-radius: 8px; }
        .reset-btn { width: 100%; background: #e74c3c; color: white; border: none; margin-top: 12px; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui-panel">
        <div class="header">
            <img src="siyo.png" id="mascot-img" alt="Si Yo" onerror="this.src='https://via.placeholder.com/50?text=Si+Yo'">
            <h2>Net Builder</h2>
        </div>
        
        <div class="menu">
            <button onclick="spawn('square')">PERSEGI</button>
            <button onclick="spawn('triangle')">SEGITIGA</button>
            <button onclick="spawn('circle')">LINGKARAN</button>
            <button onclick="rotateSelected()" style="background: #f39c12; color: white; border: none;">PUTAR (R)</button>
        </div>

        <div class="editor-panel">
            <div class="control-group">
                <label>Warna</label>
                <input type="color" id="colorInput" value="#3498db" onchange="updateSelected()">
            </div>
            <div class="control-group">
                <label>Ukuran</label>
                <input type="range" id="sizeInput" min="1" max="10" step="0.5" value="4" oninput="updateSelected()">
            </div>
        </div>

        <div class="hint">
            <b>1. Klik Objek</b> untuk memilih.<br>
            <b>2. Drag</b> untuk memindah.<br>
            <b>3. Tekan R</b> untuk memutar 45°.
        </div>
        <button class="reset-btn" onclick="location.reload()">HAPUS SEMUA</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
